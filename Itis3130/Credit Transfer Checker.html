  "MKT 120": { uncc: "MKTG 2101", title: "Principles of Marketing",                    credits: 3, status: "transfers",   category: "Business" },
  "REL 110": { uncc: "—",         title: "World Religions",                            credits: 3, status: "review",      category: "Humanities" },
  "ART 111": { uncc: "—",         title: "Art Appreciation",                           credits: 3, status: "review",      category: "Arts" },
  "PHI 215": { uncc: "—",         title: "Philosophical Issues",                       credits: 3, status: "review",      category: "Humanities" },
  "CIS 110": { uncc: "—",         title: "Introduction to Computers",                  credits: 3, status: "no-transfer", category: "Computer Science" },
  "ENG 002": { uncc: "—",         title: "Developmental English",                      credits: 3, status: "no-transfer", category: "Developmental" },

const SAMPLE_COURSES = [
  "ENG 111","ENG 112","MAT 171","MAT 271","MAT 272",
  "BIO 111","CHM 151","PSY 150","ECO 251","CSC 151",
  "ACC 120","ACC 121","HIS 111","CIS 110","ENG 002",

const INSTITUTIONS = [

  "Rowan-Cabarrus Community College",
  "Stanly Community College",

  "Mitchell Community College",
  "Other NC Community College",
];

const STATUS_CONFIG = {
  "transfers":   { label: "Transfers",         bg: "rgba(0,80,53,.1)",     color: "var(--green-deep)", dot: "#005035" },
  "review":      { label: "Pending Review",    bg: "rgba(168,146,50,.12)", color: "var(--gold)",       dot: "var(--gold-bright)" },
  "no-transfer": { label: "Does Not Transfer", bg: "rgba(192,57,43,.1)",   color: "var(--red)",        dot: "var(--red)" },

/* ─── BADGE ─── */
function Badge({ status }) {
  const cfg = STATUS_CONFIG[status];
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      background: cfg.bg, color: cfg.color,
      fontSize: 11, fontWeight: 700, letterSpacing: '.06em', textTransform: 'uppercase',
      padding: '4px 10px', borderRadius: 2,
    }}>
      <span style={{ width: 6, height: 6, borderRadius: '50%', background: cfg.dot, flexShrink: 0 }} />
      {cfg.label}
    </span>
  );
}

/* ─── ICONS ─── */
function Icon({ name, size = 18, color = 'currentColor' }) {
  const icons = {
    plus:     <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M12 5v14M5 12h14"/></svg>,
    search:   <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><circle cx="11" cy="11" r="8"/><path strokeLinecap="round" strokeLinejoin="round" d="m21 21-4.35-4.35"/></svg>,
    upload:   <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline strokeLinecap="round" strokeLinejoin="round" points="17 8 12 3 7 8"/><line strokeLinecap="round" x1="12" y1="3" x2="12" y2="15"/></svg>,
    trash:    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path strokeLinecap="round" strokeLinejoin="round" d="M19 6l-1 14H6L5 6"/><path strokeLinecap="round" strokeLinejoin="round" d="M10 11v6M14 11v6"/><path strokeLinecap="round" strokeLinejoin="round" d="M9 6V4h6v2"/></svg>,
    download: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline strokeLinecap="round" strokeLinejoin="round" points="7 10 12 15 17 10"/><line strokeLinecap="round" x1="12" y1="15" x2="12" y2="3"/></svg>,
    info:     <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><circle cx="12" cy="12" r="10"/><path strokeLinecap="round" strokeLinejoin="round" d="M12 16v-4M12 8h.01"/></svg>,
    chevron:  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7"/></svg>,
    x:        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M18 6L6 18M6 6l12 12"/></svg>,
  };
  return icons[name] || null;
}

/* ─── DONUT PROGRESS ─── */
function CreditDonut({ transferred, cap, size = 160 }) {
  const R = 54;
  const C = 2 * Math.PI * R;
  const pct = Math.min(transferred / cap, 1);
  const dash = pct * C;
  const color = transferred >= cap ? 'var(--red)' : transferred >= cap * 0.75 ? 'var(--gold-bright)' : 'var(--green-deep)';
  return (
    <div style={{ position: 'relative', width: size, height: size, flexShrink: 0 }}>
      <svg width={size} height={size} viewBox="0 0 120 120" style={{ transform: 'rotate(-90deg)' }}>
        <circle cx="60" cy="60" r={R} fill="none" stroke="var(--border)" strokeWidth="10" />
        <circle
          cx="60" cy="60" r={R} fill="none"
          stroke={color} strokeWidth="10" strokeLinecap="round"
          strokeDasharray={`${dash} ${C - dash}`}
          style={{ transition: 'stroke-dasharray .6s ease, stroke .3s' }}
        />
      </svg>
      <div style={{
        position: 'absolute', inset: 0,
        display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
      }}>
        <div style={{ fontFamily: 'var(--font-display)', fontWeight: 900, fontSize: 28, lineHeight: 1, color, letterSpacing: '-.02em' }}>
          {transferred}
        </div>
        <div style={{ fontSize: 11, color: 'var(--muted)', letterSpacing: '.04em', textTransform: 'uppercase' }}>
          of {cap} cr
        </div>
      </div>
    </div>
  );
}

/* ─── MAIN APP ─── */
function App() {
  const [institution, setInstitution]         = React.useState('');
  const [inputCode, setInputCode]             = React.useState('');
  const [inputGrade, setInputGrade]           = React.useState('A');
  const [courses, setCourses]                 = React.useState([]);
  const [filterStatus, setFilterStatus]       = React.useState('all');
  const [filterCategory, setFilterCategory]   = React.useState('all');
  const [sortBy, setSortBy]                   = React.useState('order');
  const [uploadMsg, setUploadMsg]             = React.useState('');
  const [searchSuggestions, setSearchSuggestions] = React.useState([]);
  const [showSuggestions, setShowSuggestions] = React.useState(false);
  const [hasSearched, setHasSearched]         = React.useState(false);
  const inputRef = React.useRef(null);

  /* Derived stats */
  const transferredCourses  = courses.filter(c => c.status === 'transfers');
  const transferredCredits  = transferredCourses.reduce((s, c) => s + c.credits, 0);
  const reviewCourses       = courses.filter(c => c.status === 'review');
  const noTransferCourses   = courses.filter(c => c.status === 'no-transfer');

  /* Filtered + sorted rows */
  const filteredCourses = React.useMemo(() => {
    let result = [...courses];
    if (filterStatus !== 'all')   result = result.filter(c => c.status === filterStatus);
    if (filterCategory !== 'all') result = result.filter(c => c.category === filterCategory);
    if (sortBy === 'credits-desc') result.sort((a, b) => b.credits - a.credits);
    else if (sortBy === 'credits-asc') result.sort((a, b) => a.credits - b.credits);
    else if (sortBy === 'status') result.sort((a, b) => {
      const order = { transfers: 0, review: 1, 'no-transfer': 2 };
      return order[a.status] - order[b.status];
    });
    else if (sortBy === 'category') result.sort((a, b) => a.category.localeCompare(b.category));
    return result;
  }, [courses, filterStatus, filterCategory, sortBy]);

  const categories = [...new Set(courses.map(c => c.category))].sort();

  /* Autocomplete */
  const handleInputChange = (val) => {
    setInputCode(val.toUpperCase());
    if (val.length >= 2) {
      const matches = Object.keys(COURSE_DB)
        .filter(k => k.startsWith(val.toUpperCase()) && !courses.find(c => c.code === k))
        .slice(0, 6);
      setSearchSuggestions(matches);
      setShowSuggestions(matches.length > 0);
    } else {
      setShowSuggestions(false);
    }
  };

  const addCourse = (code) => {
    const trimmed = (code || inputCode).trim().toUpperCase();
    if (!trimmed) return;
    if (courses.find(c => c.code === trimmed)) {
      setInputCode(''); setShowSuggestions(false); return;
    }
    const found = COURSE_DB[trimmed];
    const newCourse = found
      ? { code: trimmed, ...found, grade: inputGrade, id: Date.now() }
      : { code: trimmed, uncc: '—', title: 'Course not found in database', credits: 3, status: 'review', category: 'Unknown', grade: inputGrade, id: Date.now() };
    setCourses(prev => [...prev, newCourse]);
    setInputCode(''); setShowSuggestions(false); setHasSearched(true);
    inputRef.current?.focus();
  };

  const removeCourse = (id) => setCourses(prev => prev.filter(c => c.id !== id));

  const loadSample = () => {
    setInstitution(INSTITUTIONS[0]);
    setCourses(SAMPLE_COURSES.map((code, i) => {
      const found = COURSE_DB[code];
      return found
        ? { code, ...found, grade: SAMPLE_GRADES[i] || 'A', id: i + 1 }
        : { code, uncc: '—', title: 'Not in database', credits: 3, status: 'review', category: 'Unknown', grade: 'A', id: i + 1 };
    }));
    setHasSearched(true);
  };

  const handleFileUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setUploadMsg(`Parsing "${file.name}"…`);
    setTimeout(() => {
      loadSample();
      setUploadMsg(`Transcript parsed — ${SAMPLE_COURSES.length} courses imported from "${file.name}"`);
    }, 1200);
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter')  { e.preventDefault(); addCourse(); }
    if (e.key === 'Escape') setShowSuggestions(false);
  };

  const overCap = transferredCredits > CREDIT_CAP;
  const barPct  = Math.min((transferredCredits / CREDIT_CAP) * 100, 100);

  /* ── GRID COLUMNS ── */
  const gridCols = '110px 90px 1fr 90px 130px 50px 40px';
  const gridHeaders = ['CC Code', 'UNCC Equiv.', 'Course Title', 'Credits', 'Status', 'Grade', ''];

  return (
    <div style={{ paddingTop: 64, minHeight: '100vh', background: 'var(--surface)' }}>

      {/* PAGE HEADER */}
      <div style={{ background: 'var(--green-deep)', padding: '48px 72px 40px', position: 'relative', overflow: 'hidden' }}>
        <div style={{
          position: 'absolute', right: -20, bottom: -40,
          fontFamily: 'var(--font-display)', fontWeight: 900, fontSize: 280,
          color: 'transparent', WebkitTextStroke: '1px rgba(200,162,39,.08)',
          lineHeight: 1, pointerEvents: 'none', userSelect: 'none',
        }}>TES</div>
        <div style={{ position: 'relative', zIndex: 2 }}>
          <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '.18em', textTransform: 'uppercase', color: 'var(--gold-bright)', marginBottom: 14, display: 'flex', alignItems: 'center', gap: 10 }}>
            <span style={{ display: 'block', width: 28, height: 2, background: 'var(--gold)' }} />
            Transfer Equivalency System
          </div>
          <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 40 }}>
            <div>
              <h1 style={{ fontFamily: 'var(--font-display)', fontWeight: 900, fontSize: 'clamp(44px,4.5vw,64px)', textTransform: 'uppercase', lineHeight: .93, letterSpacing: '-.01em', color: '#fff', marginBottom: 12 }}>
                Credit Transfer<br /><span style={{ color: 'var(--gold-bright)' }}>Checker</span>
              </h1>
              <p style={{ fontSize: 15, color: 'rgba(255,255,255,.6)', maxWidth: 460, lineHeight: 1.7, fontWeight: 300 }}>
                Enter your community college course codes to instantly see how they transfer to UNC Charlotte — course by course.
              </p>
            </div>
            {courses.length > 0 && (
              <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, flexShrink: 0 }}>
                <CreditDonut transferred={transferredCredits} cap={CREDIT_CAP} size={140} />
                <div style={{ fontSize: 11, color: 'rgba(255,255,255,.4)', letterSpacing: '.08em', textTransform: 'uppercase' }}>Transferable Credits</div>
              </div>
            )}
          </div>
        </div>
      </div>

      {/* MAIN LAYOUT */}
      <div style={{ display: 'grid', gridTemplateColumns: '360px 1fr', minHeight: 'calc(100vh - 240px)' }}>

        {/* LEFT PANEL */}
        <div style={{
          background: 'var(--white)', borderRight: '1px solid var(--border)',
          padding: '32px 28px', position: 'sticky', top: 64,
          height: 'calc(100vh - 64px)', overflowY: 'auto',
          display: 'flex', flexDirection: 'column', gap: 24,
        }}>

          {/* Institution */}
          <div>
            <label style={{ display: 'block', fontSize: 11, fontWeight: 700, letterSpacing: '.1em', textTransform: 'uppercase', color: 'var(--muted)', marginBottom: 8 }}>
              Your Institution
            </label>
            <select
              value={institution}
              onChange={e => setInstitution(e.target.value)}
              style={{
                width: '100%', height: 40, padding: '0 12px',
                border: '1.5px solid var(--border)', borderRadius: 3,
                fontFamily: 'var(--font-body)', fontSize: 14,
                color: institution ? 'var(--ink)' : 'var(--muted)',
                background: 'var(--white)', outline: 'none', appearance: 'none',
                backgroundImage: `url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='rgba(90,90,85,.6)' d='M0 0h12L6 8z'/></svg>")`,
                backgroundRepeat: 'no-repeat', backgroundPosition: 'right 12px center',
              }}
            >
              <option value="">Select your community college…</option>
              {INSTITUTIONS.map(i => <option key={i} value={i}>{i}</option>)}
            </select>
          </div>

          {/* Course code entry */}
          <div>
            <label style={{ display: 'block', fontSize: 11, fontWeight: 700, letterSpacing: '.1em', textTransform: 'uppercase', color: 'var(--muted)', marginBottom: 8 }}>
              Add Course Code
            </label>
            <div style={{ display: 'flex', gap: 8, position: 'relative' }}>
              <div style={{ flex: 1, position: 'relative' }}>
                <input
                  ref={inputRef}
                  value={inputCode}
                  onChange={e => handleInputChange(e.target.value)}
                  onKeyDown={handleKeyDown}
                  onFocus={() => inputCode.length >= 2 && setShowSuggestions(searchSuggestions.length > 0)}
                  onBlur={() => setTimeout(() => setShowSuggestions(false), 150)}
                  onFocusCapture={e => { e.target.style.borderColor = 'var(--green-deep)'; }}
                  onBlurCapture={e => { e.target.style.borderColor = 'var(--border)'; }}
                  placeholder="e.g. ENG 111, MAT 271"
                  style={{
                    width: '100%', height: 40, padding: '0 12px',
                    border: '1.5px solid var(--border)', borderRadius: 3,
                    fontFamily: 'var(--font-mono)', fontSize: 14, color: 'var(--ink)',
                    background: 'var(--white)', outline: 'none', letterSpacing: '.05em',
                  }}
                />
                {showSuggestions && (
                  <div style={{
                    position: 'absolute', top: '100%', left: 0, right: 0, zIndex: 50,
                    background: 'var(--white)', border: '1.5px solid var(--green-deep)',
                    borderTop: 'none', borderRadius: '0 0 3px 3px',
                    boxShadow: '0 8px 24px rgba(0,0,0,.1)',
                  }}>
                    {searchSuggestions.map(code => {
                      const info = COURSE_DB[code];
                      return (
                        <div
                          key={code}
                          onMouseDown={() => addCourse(code)}
                          onMouseEnter={e => e.currentTarget.style.background = 'var(--green-light)'}
                          onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
                          style={{
                            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                            padding: '10px 12px', cursor: 'pointer', gap: 12,
                            borderBottom: '1px solid var(--border)', transition: 'background .1s',
                          }}
                        >
                          <div>
                            <div style={{ fontFamily: 'var(--font-mono)', fontSize: 13, fontWeight: 500, color: 'var(--green-deep)' }}>{code}</div>
                            <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 1 }}>{info.title}</div>
                          </div>
                          <div style={{ fontSize: 12, color: 'var(--muted)', whiteSpace: 'nowrap' }}>{info.credits} cr</div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
              <button
                onClick={() => addCourse()}
                onMouseEnter={e => e.currentTarget.style.background = 'var(--green-mid)'}
                onMouseLeave={e => e.currentTarget.style.background = 'var(--green-deep)'}
                title="Add course"
                style={{
                  width: 40, height: 40, background: 'var(--green-deep)', border: 'none',
                  borderRadius: 3, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
                  transition: 'background .2s', flexShrink: 0,
                }}
              >
                <Icon name="plus" size={18} color="white" />
              </button>
            </div>
            <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 6 }}>Press Enter or click + to add. Type to search.</div>
          </div>

          {/* Grade selector */}
          <div>
            <label style={{ display: 'block', fontSize: 11, fontWeight: 700, letterSpacing: '.1em', textTransform: 'uppercase', color: 'var(--muted)', marginBottom: 8 }}>
              Grade Received
            </label>
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
              {['A','B','C','D','F','W','TR'].map(g => (
                <button
                  key={g}
                  onClick={() => setInputGrade(g)}
                  style={{
                    width: 40, height: 36,
                    fontFamily: 'var(--font-mono)', fontSize: 13, fontWeight: 600,
                    border: `1.5px solid ${inputGrade === g ? 'var(--green-deep)' : 'var(--border)'}`,
                    borderRadius: 3, cursor: 'pointer',
                    background: inputGrade === g ? 'var(--green-deep)' : 'transparent',
                    color: inputGrade === g ? '#fff' : 'var(--muted)',
                    transition: 'all .15s',
                  }}
                >{g}</button>
              ))}
            </div>
            <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 6 }}>Minimum passing grade for transfer: D (C for some programs)</div>
          </div>

          <div style={{ height: 1, background: 'var(--border)' }} />

          {/* Upload transcript */}
          <div>
            <label style={{ display: 'block', fontSize: 11, fontWeight: 700, letterSpacing: '.1em', textTransform: 'uppercase', color: 'var(--muted)', marginBottom: 8 }}>
              Upload Transcript
            </label>
            <label
              onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--green-deep)'; e.currentTarget.style.background = 'var(--green-light)'; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.background = 'var(--surface)'; }}
              style={{
                display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
                gap: 8, padding: '20px 16px',
                border: '1.5px dashed var(--border)', borderRadius: 3,
                cursor: 'pointer', background: 'var(--surface)', transition: 'border-color .2s, background .2s',
              }}
            >
              <Icon name="upload" size={22} color="var(--green-deep)" />
              <div style={{ fontSize: 13, fontWeight: 500, color: 'var(--ink)' }}>Drop PDF or click to upload</div>
              <div style={{ fontSize: 11, color: 'var(--muted)' }}>Official or unofficial transcript accepted</div>
              <input type="file" accept=".pdf,.doc,.docx" style={{ display: 'none' }} onChange={handleFileUpload} />
            </label>
            {uploadMsg && (
              <div style={{ marginTop: 8, fontSize: 12, color: 'var(--green-deep)', background: 'var(--green-light)', padding: '8px 12px', borderRadius: 2 }}>
                {uploadMsg}
              </div>
            )}
          </div>

          {/* Load sample */}
          <button
            onClick={loadSample}
            onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--green-deep)'; e.currentTarget.style.color = 'var(--green-deep)'; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.color = 'var(--muted)'; }}
            style={{
              width: '100%', padding: '10px', borderRadius: 3,
              border: '1px solid var(--border)', background: 'transparent',
              fontFamily: 'var(--font-body)', fontSize: 13, fontWeight: 500,
              color: 'var(--muted)', cursor: 'pointer', transition: 'all .2s',
            }}
          >
            Load Sample Transcript
          </button>

          <div style={{ flex: 1 }} />

          {/* Tips */}
          {SHOW_TIPS && (
            <div style={{ background: 'var(--gold-pale)', border: '1px solid rgba(168,146,50,.25)', borderRadius: 3, padding: '16px' }}>
              <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '.1em', textTransform: 'uppercase', color: 'var(--gold)', marginBottom: 8, display: 'flex', alignItems: 'center', gap: 6 }}>
                <Icon name="info" size={13} color="var(--gold)" /> Tip
              </div>
              <div style={{ fontSize: 12, color: 'var(--ink)', lineHeight: 1.6 }}>
                Courses marked <strong>Pending Review</strong> require individual evaluation. Contact your transfer advisor for a final determination.
              </div>
            </div>
          )}
        </div>

        {/* RIGHT PANEL */}
        <div style={{ padding: '28px 40px 60px', minWidth: 0 }}>

          {!hasSearched ? (
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', minHeight: 400, gap: 20, paddingTop: 60 }}>
              <div style={{ width: 80, height: 80, background: 'var(--green-light)', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <Icon name="search" size={32} color="var(--green-deep)" />
              </div>
              <div style={{ textAlign: 'center' }}>
                <div style={{ fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: 24, textTransform: 'uppercase', color: 'var(--ink)', marginBottom: 8 }}>
                  No Courses Added Yet
                </div>
                <div style={{ fontSize: 14, color: 'var(--muted)', lineHeight: 1.7, maxWidth: 360 }}>
                  Enter a course code on the left (e.g.{' '}
                  <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--green-deep)' }}>ENG 111</span>
                  ), upload a transcript, or load the sample data to see results.
                </div>
              </div>
              <button
                onClick={loadSample}
                style={{
                  display: 'inline-flex', alignItems: 'center', gap: 8,
                  background: 'var(--gold)', color: 'var(--green-deep)',
                  fontFamily: 'var(--font-body)', fontSize: 13, fontWeight: 700,
                  letterSpacing: '.06em', textTransform: 'uppercase',
                  padding: '12px 24px', borderRadius: 3, border: 'none', cursor: 'pointer',
                }}
              >
                Load Sample Data <Icon name="chevron" size={14} color="var(--green-deep)" />
              </button>
            </div>
          ) : (
            <>
              {/* STATS ROW */}
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 12, marginBottom: 24 }}>
                {[
                  { label: 'Total Courses',        val: courses.length,          color: 'var(--ink)',       bg: 'var(--white)'    },
                  { label: 'Transferable Credits',  val: `${transferredCredits} cr`, color: 'var(--green-deep)', bg: 'var(--green-light)' },
                  { label: 'Pending Review',        val: reviewCourses.length,    color: 'var(--gold)',      bg: 'var(--gold-pale)'  },
                  { label: 'Not Transferring',      val: noTransferCourses.length, color: 'var(--red)',      bg: 'var(--red-pale)'   },
                ].map(s => (
                  <div key={s.label} style={{ background: s.bg, border: '1px solid var(--border)', borderRadius: 3, padding: '16px 20px' }}>
                    <div style={{ fontFamily: 'var(--font-display)', fontWeight: 900, fontSize: 28, color: s.color, lineHeight: 1, marginBottom: 4 }}>{s.val}</div>
                    <div style={{ fontSize: 11, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '.08em' }}>{s.label}</div>
                  </div>
                ))}
              </div>

              {/* CREDIT CAP BAR */}
              <div style={{ background: 'var(--white)', border: '1px solid var(--border)', borderRadius: 3, padding: '20px 24px', marginBottom: 24 }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--ink)' }}>
                      Transfer Credit Cap Progress
                      <span style={{ fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--muted)', marginLeft: 12 }}>
                        {transferredCredits} / {CREDIT_CAP} credits
                      </span>
                    </div>
                    <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 2 }}>
                      Maximum transferable credits from a 2-year institution: {CREDIT_CAP}
                    </div>
                  </div>
                  <div style={{ fontSize: 13, fontWeight: 700, color: overCap ? 'var(--red)' : 'var(--green-deep)' }}>
                    {overCap ? `${transferredCredits - CREDIT_CAP} over cap` : `${CREDIT_CAP - transferredCredits} remaining`}
                  </div>
                </div>
                <div style={{ height: 10, background: 'var(--border)', borderRadius: 5, overflow: 'hidden' }}>
                  <div style={{
                    height: '100%', borderRadius: 5, width: `${barPct}%`,
                    background: overCap ? 'var(--red)' : transferredCredits >= CREDIT_CAP * 0.75 ? 'var(--gold-bright)' : 'var(--green-deep)',
                    transition: 'width .5s ease, background .3s',
                  }} />
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 6 }}>
                  {[0, 25, 50, 75, 100].map(p => (
                    <div key={p} style={{ fontSize: 10, color: 'var(--muted)', fontFamily: 'var(--font-mono)' }}>
                      {Math.round(CREDIT_CAP * p / 100)}
                    </div>
                  ))}
                </div>
              </div>

              {/* TABLE CONTROLS */}
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16, marginBottom: 12, flexWrap: 'wrap' }}>
                <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                  {['all','transfers','review','no-transfer'].map(s => (
                    <button key={s} onClick={() => setFilterStatus(s)} style={{
                      padding: '6px 14px', borderRadius: 2, cursor: 'pointer',
                      fontSize: 12, fontWeight: 600, letterSpacing: '.04em', textTransform: 'uppercase',
                      background: filterStatus === s ? 'var(--green-deep)' : 'var(--white)',
                      color: filterStatus === s ? '#fff' : 'var(--muted)',
                      border: `1px solid ${filterStatus === s ? 'var(--green-deep)' : 'var(--border)'}`,
                      transition: 'all .15s',
                    }}>
                      {s === 'all' ? 'All' : s === 'transfers' ? 'Transfers' : s === 'review' ? 'Review' : 'No Transfer'}
                    </button>
                  ))}
                </div>
                <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                  <select value={filterCategory} onChange={e => setFilterCategory(e.target.value)} style={{
                    height: 32, padding: '0 28px 0 10px', border: '1px solid var(--border)',
                    borderRadius: 2, fontFamily: 'var(--font-body)', fontSize: 12,
                    color: 'var(--ink)', background: 'var(--white)', outline: 'none', appearance: 'none',
                    backgroundImage: `url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='rgba(90,90,85,.6)' d='M0 0h10L5 6z'/></svg>")`,
                    backgroundRepeat: 'no-repeat', backgroundPosition: 'right 8px center',
                  }}>
                    <option value="all">All Categories</option>
                    {categories.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                  <select value={sortBy} onChange={e => setSortBy(e.target.value)} style={{
                    height: 32, padding: '0 28px 0 10px', border: '1px solid var(--border)',
                    borderRadius: 2, fontFamily: 'var(--font-body)', fontSize: 12,
                    color: 'var(--ink)', background: 'var(--white)', outline: 'none', appearance: 'none',
                    backgroundImage: `url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='rgba(90,90,85,.6)' d='M0 0h10L5 6z'/></svg>")`,
                    backgroundRepeat: 'no-repeat', backgroundPosition: 'right 8px center',
                  }}>
                    <option value="order">Sort: Added Order</option>
                    <option value="status">Sort: Status</option>
                    <option value="credits-desc">Sort: Credits ↓</option>
                    <option value="credits-asc">Sort: Credits ↑</option>
                    <option value="category">Sort: Category</option>
                  </select>
                  <button
                    onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--green-deep)'; e.currentTarget.style.color = 'var(--green-deep)'; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.color = 'var(--muted)'; }}
                    style={{
                      display: 'inline-flex', alignItems: 'center', gap: 6, height: 32, padding: '0 14px',
                      border: '1px solid var(--border)', borderRadius: 2, background: 'var(--white)',
                      fontFamily: 'var(--font-body)', fontSize: 12, fontWeight: 600, color: 'var(--muted)',
                      cursor: 'pointer', transition: 'all .15s',
                    }}
                  >
                    <Icon name="download" size={13} color="currentColor" /> Export CSV
                  </button>
                </div>
              </div>

              {/* RESULTS TABLE */}
              <div style={{ background: 'var(--white)', border: '1px solid var(--border)', borderRadius: 3, overflow: 'hidden' }}>
                <div style={{ display: 'grid', gridTemplateColumns: gridCols, background: 'var(--ink)', padding: '12px 20px', alignItems: 'center' }}>
                  {gridHeaders.map((h, i) => (
                    <div key={i} style={{ fontSize: 10, fontWeight: 700, letterSpacing: '.1em', textTransform: 'uppercase', color: 'rgba(255,255,255,.45)' }}>{h}</div>
                  ))}
                </div>

                {filteredCourses.length === 0 ? (
                  <div style={{ padding: '32px', textAlign: 'center', color: 'var(--muted)', fontSize: 14 }}>
                    No courses match the current filter.
                  </div>
                ) : (
                  filteredCourses.map((course, i) => (
                    <div
                      key={course.id}
                      onMouseEnter={e => e.currentTarget.style.background = 'var(--green-light)'}
                      onMouseLeave={e => e.currentTarget.style.background = i % 2 === 0 ? 'var(--white)' : 'rgba(247,246,242,.6)'}
                      style={{
                        display: 'grid', gridTemplateColumns: gridCols,
                        padding: '14px 20px', alignItems: 'center',
                        borderBottom: i < filteredCourses.length - 1 ? '1px solid var(--border)' : 'none',
                        background: i % 2 === 0 ? 'var(--white)' : 'rgba(247,246,242,.6)',
                        transition: 'background .1s',
                      }}
                    >
                      <div style={{ fontFamily: 'var(--font-mono)', fontSize: 13, fontWeight: 500, color: 'var(--green-deep)' }}>
                        {course.code}
                      </div>
                      <div style={{ fontFamily: 'var(--font-mono)', fontSize: 12, color: course.uncc === '—' ? 'var(--muted)' : 'var(--ink)', fontWeight: course.uncc !== '—' ? 500 : 400 }}>
                        {course.uncc}
                      </div>
                      <div style={{ fontSize: 13, color: 'var(--ink)', paddingRight: 16 }}>
                        {course.title}
                        <span style={{ marginLeft: 8, fontSize: 10, fontWeight: 600, letterSpacing: '.08em', textTransform: 'uppercase', color: 'var(--muted)', background: 'var(--border)', padding: '2px 6px', borderRadius: 2 }}>
                          {course.category}
                        </span>
                      </div>
                      <div style={{ fontFamily: 'var(--font-mono)', fontSize: 13, color: 'var(--ink)', fontWeight: 600 }}>
                        {course.credits} cr
                      </div>
                      <div><Badge status={course.status} /></div>
                      <div style={{
                        fontFamily: 'var(--font-mono)', fontSize: 14, fontWeight: 700,
                        color: ['F','W'].includes(course.grade) ? 'var(--red)' : course.grade === 'D' ? 'var(--gold)' : 'var(--ink)',
                      }}>
                        {course.grade}
                      </div>
                      <button
                        onClick={() => removeCourse(course.id)}
                        onMouseEnter={e => { e.currentTarget.style.background = 'var(--red-pale)'; e.currentTarget.style.color = 'var(--red)'; }}
                        onMouseLeave={e => { e.currentTarget.style.background = 'none'; e.currentTarget.style.color = 'var(--muted)'; }}
                        title="Remove course"
                        style={{
                          width: 28, height: 28, background: 'none', border: 'none',
                          cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
                          borderRadius: 3, color: 'var(--muted)', transition: 'all .15s',
                        }}
                      >
                        <Icon name="x" size={14} color="currentColor" />
                      </button>
                    </div>
                  ))
                )}

                {courses.length > 0 && (
                  <div style={{
                    display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                    padding: '14px 20px', borderTop: '2px solid var(--green-deep)',
                    background: 'var(--green-light)',
                  }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--ink)' }}>
                      {filteredCourses.length} of {courses.length} courses shown
                    </div>
                    <div style={{ display: 'flex', gap: 24 }}>
                      <div style={{ fontFamily: 'var(--font-mono)', fontSize: 13, color: 'var(--green-deep)', fontWeight: 700 }}>
                        {transferredCredits} transferable credits
                      </div>
                      <div style={{ fontFamily: 'var(--font-mono)', fontSize: 13, color: 'var(--muted)' }}>
                        {courses.reduce((s, c) => s + c.credits, 0)} total credits attempted
                      </div>
                    </div>
                  </div>
                )}
              </div>

              {courses.length > 0 && (
                <div style={{ marginTop: 24 }}>
                  <button
                    onClick={() => { setCourses([]); setHasSearched(false); setInstitution(''); setUploadMsg(''); }}
                    onMouseEnter={e => e.currentTarget.style.color = 'var(--red)'}
                    onMouseLeave={e => e.currentTarget.style.color = 'var(--muted)'}
                    style={{
                      background: 'none', border: 'none', cursor: 'pointer',
                      fontSize: 13, color: 'var(--muted)', fontFamily: 'var(--font-body)',
                      display: 'flex', alignItems: 'center', gap: 6, transition: 'color .2s',
                    }}
                  >
                    <Icon name="trash" size={14} color="currentColor" /> Clear All
                  </button>
                </div>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
